name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      # Fail the check on new high-severity CVEs. Moderate-and-below
      # still get reported by Dependabot but don't block merges.
      - name: npm audit · production deps · high severity
        run: npm audit --omit=dev --audit-level=high

      # Grep-level guard against credentials accidentally committed
      # into the shipped bundle. If anyone ever changes the Login
      # component to store plaintext state, this fails the build.
      - name: Bundle secret-leak check
        run: |
          set -e
          test -d dist/assets
          if grep -qr '"Harry"' dist/assets/; then
            echo "FAIL: plaintext password found in production bundle"
            exit 1
          fi
          echo "bundle clean · no plaintext password"
